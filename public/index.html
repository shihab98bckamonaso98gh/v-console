<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VoltX SMS — Live Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #090c10;
  --bg2:    #0e1118;
  --bg3:    #141820;
  --bg4:    #1a2030;
  --border: rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.13);
  --text:   #dde4f0;
  --text2:  #7e8fa8;
  --text3:  #4a5568;
  --accent: #2ee5a8;
  --a2:     rgba(46,229,168,0.14);
  --a3:     rgba(46,229,168,0.07);
  --fb:  #1877f2; --fb2: rgba(24,119,242,0.13);
  --ig:  #e1306c; --ig2: rgba(225,48,108,0.13);
  --wa:  #25d366; --wa2: rgba(37,211,102,0.13);
  --tg:  #29b6f6; --tg2: rgba(41,182,246,0.13);
  --tw:  #1d9bf0; --tw2: rgba(29,155,240,0.13);
  --red: #ef4444;
  --grn: #22c55e;
  --r:   10px; --r2: 6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
.hdr{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;position:sticky;top:0;z-index:100;
}
.hdr-in{
  max-width:1400px;margin:0 auto;
  display:flex;align-items:center;gap:10px;height:52px;
}
.logo{
  display:flex;align-items:center;gap:8px;
  font-weight:800;font-size:15px;letter-spacing:-.02em;color:var(--accent);
}
.logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);box-shadow:0 0 8px var(--accent);
  animation:blink 2s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-gap{flex:1}
.live-pill{
  display:flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:999px;
  background:rgba(34,197,94,.1);color:#22c55e;
  font-size:10px;font-weight:700;letter-spacing:.07em;
  font-family:'JetBrains Mono',monospace;
}
.live-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:blink 1.4s infinite;}
.timer-txt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text3);}
.timer-txt b{color:var(--accent);}
.ico-btn{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text2);border-radius:var(--r2);
  padding:5px 7px;cursor:pointer;display:flex;align-items:center;
  transition:all .15s;
}
.ico-btn:hover{background:var(--bg4);color:var(--accent);border-color:var(--a2);}
.ico-btn.spin svg{animation:rot .6s linear infinite;}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── LOAD BAR ── */
.lbar{height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);
  background-size:200%;animation:sweep 1.1s linear infinite;display:none;}
.lbar.on{display:block;}
@keyframes sweep{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── TABS ── */
.tabs{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;position:sticky;top:52px;z-index:99;
}
.tabs-in{
  max-width:1400px;margin:0 auto;
  display:flex;gap:4px;overflow-x:auto;
  padding:8px 0;scrollbar-width:none;
}
.tabs-in::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;gap:6px;
  padding:6px 13px;border-radius:var(--r2);
  border:1px solid var(--border);background:transparent;
  color:var(--text2);font-family:'Syne',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;
  white-space:nowrap;transition:all .15s;letter-spacing:.02em;
}
.tab:hover{background:var(--bg3);color:var(--text);}
.tab.on{color:#fff;border-color:var(--tc,var(--accent));
  background:var(--tb,var(--a3));
  box-shadow:0 0 14px var(--tg_,rgba(46,229,168,.12));}
.tab[data-t=all].on    {--tc:var(--accent);--tb:var(--a3);--tg_:rgba(46,229,168,.12)}
.tab[data-t=facebook].on  {--tc:var(--fb);--tb:var(--fb2);--tg_:rgba(24,119,242,.18)}
.tab[data-t=instagram].on {--tc:var(--ig);--tb:var(--ig2);--tg_:rgba(225,48,108,.18)}
.tab[data-t=whatsapp].on  {--tc:var(--wa);--tb:var(--wa2);--tg_:rgba(37,211,102,.18)}
.tab[data-t=telegram].on  {--tc:var(--tg);--tb:var(--tg2);--tg_:rgba(41,182,246,.18)}
.tab[data-t=twitter].on   {--tc:var(--tw);--tb:var(--tw2);--tg_:rgba(29,155,240,.18)}
.badge{
  padding:1px 6px;border-radius:999px;
  font-size:10px;font-family:'JetBrains Mono',monospace;
  background:var(--border);color:var(--text3);min-width:20px;text-align:center;
}
.tab.on .badge{background:rgba(255,255,255,.1);color:var(--text2);}

/* ── BRAND STRIP ── */
.brand-strip{max-width:1400px;margin:0 auto;padding:14px 16px 0;display:none;}
.brand-strip.vis{display:block;}
.brand-name{
  display:flex;align-items:center;gap:10px;
  font-size:18px;font-weight:800;letter-spacing:-.02em;
  padding-bottom:12px;border-bottom:1px solid var(--border);
}

/* ── SOURCE BADGE ── */
.src-bar{max-width:1400px;margin:0 auto;padding:6px 16px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.src-pill{
  font-family:'JetBrains Mono',monospace;font-size:10px;
  padding:2px 8px;border-radius:999px;
  display:inline-flex;align-items:center;gap:4px;
}
.src-live{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.2);}
.src-demo{background:rgba(245,158,11,.1);color:#f59e0b;border:1px solid rgba(245,158,11,.2);}
.src-err {background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);}
.src-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}

/* ── SEARCH ── */
.srch-wrap{max-width:1400px;margin:0 auto;padding:10px 16px;}
.srch-inner{position:relative;}
.srch-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none;}
.srch-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r2);padding:8px 12px 8px 34px;
  color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;
  outline:none;transition:border-color .15s;
}
.srch-input:focus{border-color:var(--accent);}
.srch-input::placeholder{color:var(--text3);}

/* ── CONSOLE ── */
.con-wrap{max-width:1400px;margin:0 auto;padding:0 16px 32px;}
.con-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.con-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-bottom:1px solid var(--border);
  background:var(--bg3);
}
.con-head-title{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text2);}

/* ── LOG LINES ── */
.cn-line{
  display:flex;gap:12px;padding:10px 14px;
  border-bottom:1px solid var(--border);align-items:flex-start;
  transition:background .1s;
}
.cn-line:last-child{border-bottom:none;}
.cn-line:hover{background:rgba(255,255,255,0.018);}
.cn-line.new{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}

.meta{flex-shrink:0;width:118px;}
@media(max-width:520px){.meta{width:88px;}}
.meta-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);display:block;margin-bottom:3px;}
.meta-carrier{font-size:10px;color:var(--text3);display:block;line-height:1.4;}
.meta-country{font-size:10px;color:var(--text3);display:block;line-height:1.4;}

.body{flex:1;min-width:0;}
.tags{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:5px;}
.app-tag{
  font-size:10px;font-weight:700;padding:2px 7px;
  border-radius:4px;letter-spacing:.04em;text-transform:uppercase;
}
.a-fb{background:var(--fb2);color:var(--fb);}
.a-ig{background:var(--ig2);color:var(--ig);}
.a-wa{background:var(--wa2);color:var(--wa);}
.a-tg{background:var(--tg2);color:var(--tg);}
.a-tw{background:var(--tw2);color:var(--tw);}
.a-ot{background:rgba(255,255,255,.05);color:var(--text3);}
.sep{color:var(--text3);font-size:11px;}

.range-tag{
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  color:var(--accent);background:var(--a3);
  border:1px solid rgba(46,229,168,.18);
  padding:2px 8px;border-radius:4px;
  cursor:pointer;user-select:none;
  transition:all .15s;display:inline-flex;align-items:center;gap:4px;
}
.range-tag:hover{background:var(--a2);border-color:var(--accent);box-shadow:0 0 10px rgba(46,229,168,.2);transform:scale(1.03);}
.range-tag:active{transform:scale(.96);}
.range-tag.copied{background:rgba(34,197,94,.18);border-color:#22c55e;color:#22c55e;}

.sms-txt{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--text2);line-height:1.6;word-break:break-word;
}
.arrow{color:var(--text3);margin-right:4px;}

/* ── FOOTER ── */
.con-foot{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 14px;border-top:1px solid var(--border);
  background:var(--bg3);
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);
  flex-wrap:wrap;gap:6px;
}

/* ── EMPTY ── */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:56px 20px;color:var(--text3);gap:10px;
  font-family:'JetBrains Mono',monospace;font-size:12px;
}
.empty svg{opacity:.25;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:20px;right:20px;
  background:var(--bg3);border:1px solid var(--accent);
  color:var(--accent);padding:7px 14px;border-radius:var(--r2);
  font-family:'JetBrains Mono',monospace;font-size:12px;
  z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.5);
  opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;
}
.toast.show{opacity:1;transform:none;}

/* ── SCROLL TOP ── */
.scroll-top{
  position:fixed;bottom:20px;left:20px;
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text2);width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transition:all .2s;z-index:200;pointer-events:none;
}
.scroll-top.vis{opacity:1;pointer-events:auto;}
.scroll-top:hover{color:var(--accent);}
</style>
</head>

<script>
/* ── CONFIG ── */
const API = '/api/proxy';
const TICK = 5; // seconds

/* ── STATE ── */
let allLogs = [];
let activeTab = 'all';
let query = '';
let countdown = TICK;
let busy = false;
let lastUpdated = null;
let renderedIds = new Set();

/* ── APP DETECT ── */
function detectApp(s) {
  const t = (s||'').toLowerCase();
  if(t.includes('facebook')) return 'facebook';
  if(t.includes('instagram')) return 'instagram';
  if(t.includes('whatsapp') || t.includes('wapp')) return 'whatsapp';
  if(t.includes('telegram')) return 'telegram';
  if(t.includes('twitter') || t.includes('twit') || t.includes(' x ')) return 'twitter';
  return 'other';
}
const APP_LABELS = {facebook:'Facebook',instagram:'Instagram',whatsapp:'WhatsApp',telegram:'Telegram',twitter:'Twitter/X',other:'* * *'};
const APP_CLASS  = {facebook:'a-fb',instagram:'a-ig',whatsapp:'a-wa',telegram:'a-tg',twitter:'a-tw',other:'a-ot'};

/* ── BRAND CONFIG ── */
const BRANDS = {
  facebook:  {label:'📘 Facebook', color:'#1877f2'},
  instagram: {label:'📷 Instagram',color:'#e1306c'},
  whatsapp:  {label:'💬 WhatsApp', color:'#25d366'},
  telegram:  {label:'✈️ Telegram', color:'#29b6f6'},
  twitter:   {label:'𝕏 Twitter / X',color:'#1d9bf0'},
};

/* ── FETCH ── */
async function fetchData() {
  if(busy) return;
  busy = true;
  document.getElementById('lbar').classList.add('on');
  document.getElementById('refBtn').classList.add('spin');
  try {
    const r = await fetch(API, {cache:'no-store'});
    // Read as text first to avoid JSON parse crash
    const text = await r.text();
    let json;
    try { json = JSON.parse(text); }
    catch(e) {
      setStatus('err','Response was not JSON — proxy may be misconfigured');
      return;
    }
    const logs = (json.logs || []).map(l => ({
      ...l,
      app: detectApp(l.appRaw || l.app || '')
    }));
    if(logs.length > 0) {
      allLogs = logs;
      lastUpdated = new Date();
    }
    // Update status
    const src = json.source || 'unknown';
    if(src === 'api' || src === 'html') {
      setStatus('live', `Live data · ${logs.length} logs · via ${src}`);
    } else if(src === 'demo') {
      setStatus('demo', json.note || json.error || 'Demo mode — credentials may need updating');
    } else {
      setStatus('demo', json.error || 'Unknown source');
    }
  } catch(e) {
    setStatus('err', e.message);
  } finally {
    busy = false;
    document.getElementById('lbar').classList.remove('on');
    document.getElementById('refBtn').classList.remove('spin');
    render();
  }
}

/* ── STATUS ── */
function setStatus(type, msg) {
  const pill = document.getElementById('srcPill');
  const txt  = document.getElementById('srcTxt');
  pill.className = 'src-pill';
  if(type==='live') { pill.classList.add('src-live'); pill.textContent = '● LIVE'; }
  else if(type==='demo'){ pill.classList.add('src-demo'); pill.textContent = '◉ DEMO'; }
  else { pill.classList.add('src-err'); pill.textContent = '✕ ERROR'; }
  txt.textContent = msg;
}

/* ── FILTER ── */
function filtered() {
  let logs = allLogs;
  if(activeTab !== 'all') logs = logs.filter(l => l.app === activeTab);
  if(query) {
    const q = query.toLowerCase();
    logs = logs.filter(l =>
      (l.carrier||'').toLowerCase().includes(q) ||
      (l.country||'').toLowerCase().includes(q) ||
      (l.range||'').toLowerCase().includes(q) ||
      (l.sms||'').toLowerCase().includes(q) ||
      (l.app||'').toLowerCase().includes(q) ||
      (l.appRaw||'').toLowerCase().includes(q)
    );
  }
  return logs;
}

/* ── RENDER ── */
function render() {
  updateCounts();
  const logs = filtered();

  // Footer
  document.getElementById('footCount').textContent = `Logs: ${logs.length} / ${allLogs.length}`;
  if(lastUpdated) {
    const t = lastUpdated;
    document.getElementById('footUpdated').textContent =
      `Updated: ${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
  }

  const container = document.getElementById('logContainer');

  if(logs.length === 0) {
    container.innerHTML = `<div class="empty">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 19h8"/><path d="m4 17 6-6-6-6"/></svg>
      <span>${allLogs.length===0?'Waiting for data…':'No matching logs'}</span>
    </div>`;
    renderedIds.clear();
    return;
  }

  // Only prepend new items — don't touch existing DOM (avoids scroll jump)
  const newLogs = logs.filter(l => !renderedIds.has(lineId(l)));

  if(newLogs.length === 0) return;

  // If filter changed (tab/search switch), rebuild fully
  const shouldRebuild = container.querySelector('.empty') || newLogs.length === logs.length;

  if(shouldRebuild) {
    container.innerHTML = '';
    renderedIds.clear();
  }

  const frag = document.createDocumentFragment();
  newLogs.forEach(log => {
    const id = lineId(log);
    renderedIds.add(id);
    const div = document.createElement('div');
    div.className = 'cn-line new';
    div.dataset.id = id;
    div.innerHTML = `
      <div class="meta">
        <span class="meta-time">${esc(log.time)}</span>
        <span class="meta-carrier">${esc(log.carrier)}</span>
        <span class="meta-country">${esc(log.country)}</span>
      </div>
      <div class="body">
        <div class="tags">
          <span class="app-tag ${APP_CLASS[log.app]||'a-ot'}">${APP_LABELS[log.app]||esc(log.appRaw)}</span>
          <span class="sep">::</span>
          <span class="range-tag" data-r="${esc(log.range)}"
            onclick="copyR(this)" onkeydown="if(event.key==='Enter')copyR(this)"
            tabindex="0" title="Tap to copy"
          >${esc(log.range)}
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </span>
        </div>
        <p class="sms-txt"><span class="arrow">➜</span>${esc(log.sms)}</p>
      </div>`;
    frag.appendChild(div);
  });

  // Prepend (newest at top)
  container.insertBefore(frag, container.firstChild);

  // Trim to 150 max
  const lines = container.querySelectorAll('.cn-line');
  if(lines.length > 150) {
    for(let i = 150; i < lines.length; i++) {
      renderedIds.delete(lines[i].dataset.id);
      lines[i].remove();
    }
  }
}

function lineId(l) { return `${l.time}|${l.range}|${l.sms?.slice(0,20)}`; }
function pad(n){ return String(n).padStart(2,'0'); }
function esc(s){
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── COUNTS ── */
function updateCounts() {
  ['all','facebook','instagram','whatsapp','telegram','twitter'].forEach(t => {
    const el = document.getElementById('c-'+t);
    if(el) el.textContent = t==='all' ? allLogs.length : allLogs.filter(l=>l.app===t).length;
  });
}

/* ── COPY RANGE ── */
function copyR(el) {
  const r = el.dataset.r;
  const doIt = () => {
    el.classList.add('copied');
    const orig = el.innerHTML;
    el.textContent = '✓ Copied!';
    toast(`Copied: ${r}`);
    setTimeout(()=>{ el.classList.remove('copied'); el.innerHTML = orig; }, 1400);
  };
  if(navigator.clipboard) {
    navigator.clipboard.writeText(r).then(doIt).catch(()=>fallbackCopy(r,doIt));
  } else { fallbackCopy(r,doIt); }
}
function fallbackCopy(text, cb) {
  const ta = Object.assign(document.createElement('textarea'),{value:text,style:'position:fixed;opacity:0'});
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); cb();
}

/* ── TOAST ── */
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'), 1800);
}

/* ── TABS ── */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    activeTab = btn.dataset.t;
    renderedIds.clear();
    // Brand strip
    const bs = document.getElementById('brandStrip');
    const bn = document.getElementById('brandName');
    if(activeTab !== 'all' && BRANDS[activeTab]) {
      bs.classList.add('vis');
      bn.innerHTML = `<span style="color:${BRANDS[activeTab].color}">${BRANDS[activeTab].label}</span>`;
      bn.style.borderColor = BRANDS[activeTab].color+'33';
    } else {
      bs.classList.remove('vis');
    }
    render();
  });
});

/* ── SEARCH ── */
document.getElementById('srchInput').addEventListener('input', e => {
  query = e.target.value.trim();
  renderedIds.clear();
  render();
});

/* ── REFRESH BTN ── */
document.getElementById('refBtn').addEventListener('click', ()=>{ countdown=TICK; fetchData(); });

/* ── COUNTDOWN TIMER ── */
setInterval(() => {
  countdown--;
  document.getElementById('timerNum').textContent = countdown;
  if(countdown <= 0) { countdown = TICK; fetchData(); }
}, 1000);

/* ── SCROLL TOP ── */
window.addEventListener('scroll', () => {
  document.getElementById('scrollTopBtn').classList.toggle('vis', window.scrollY > 250);
});

/* ── INIT ── */
fetchData();
</script>
</body>
</html>
